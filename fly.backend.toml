app = "verdict-backend"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  MCP_SERVER_URL = "https://verdict-mcp.fly.dev"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 25

[mounts]
  # none needed — postgres is external

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "get"
    path = "/api/v1/health"
    timeout = "10s"
    type = "http"
